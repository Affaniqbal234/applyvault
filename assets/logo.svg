<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="54" fill="#1a1d27" stroke="#6c63ff" stroke-width="2"/>

  <!-- Vault door ring -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="#6c63ff" stroke-width="3"/>

  <!-- Vault handle spokes -->
  <line x1="60" y1="24" x2="60" y2="36" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="84" x2="60" y2="96" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="60" x2="36" y2="60" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="60" x2="96" y2="60" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center circle -->
  <circle cx="60" cy="60" r="10" fill="#6c63ff"/>

  <!-- Checkmark inside center -->
  <polyline points="55,60 58,63 65,56" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
