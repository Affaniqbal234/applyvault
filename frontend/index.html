<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApplyVault — Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <span class="auth-logo">⬡</span>
      <span class="auth-brand-name">ApplyVault</span>
    </div>

    <div class="auth-card">
      <div class="auth-tabs" role="tablist">
        <button
          class="auth-tab active"
          id="tab-login"
          role="tab"
          aria-selected="true"
          aria-controls="panel-login"
          data-tab="login"
        >Sign In</button>
        <button
          class="auth-tab"
          id="tab-register"
          role="tab"
          aria-selected="false"
          aria-controls="panel-register"
          data-tab="register"
        >Create Account</button>
      </div>

      <!-- Login panel -->
      <div id="panel-login" class="auth-panel" role="tabpanel" aria-labelledby="tab-login">
        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <div id="login-error" class="form-error" role="alert" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-submit">
            Sign In
          </button>
        </form>
      </div>

      <!-- Register panel -->
      <div id="panel-register" class="auth-panel hidden" role="tabpanel" aria-labelledby="tab-register">
        <form id="register-form" novalidate>
          <div class="field">
            <label for="register-email">Email</label>
            <input
              type="email"
              id="register-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="field">
            <label for="register-password">Password</label>
            <input
              type="password"
              id="register-password"
              name="password"
              placeholder="At least 8 characters"
              autocomplete="new-password"
              required
              minlength="8"
            />
          </div>
          <div id="register-error" class="form-error" role="alert" aria-live="polite"></div>
          <div id="register-success" class="form-success" role="status" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary btn-full" id="register-submit">
            Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
